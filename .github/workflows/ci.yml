name: CI

# Runs on every PR and every push to main. Keeps a single Linux /
# GCC-14 configuration so the signal is fast; the release workflow
# (release.yml, gated on v* tags) covers the full compiler matrix.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Silence the Node.js 20 deprecation warning from actions/checkout@v4 by
# opting into the Node 24 runtime now (GitHub forces it as default on
# 2026-06-02 and removes Node 20 on 2026-09-16). Safe to drop once Node
# 24 is the runner default. Mirror of release.yml.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fypp and mpmath
        run: pip install fypp mpmath

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 gfortran-14

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_Fortran_COMPILER=gfortran-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)
